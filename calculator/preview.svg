<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#071126"/>
      <stop offset="100%" stop-color="#081222"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0f1724"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#001" flood-opacity="0.6"/>
    </filter>
    <style type="text/css"><![CDATA[
      .title { font: 700 24px/1.2 'Inter', Arial, sans-serif; fill: #eaf4ff }
      .label { font: 600 14px/1 'Inter', Arial, sans-serif; fill: #99a1b3 }
      .screen-value { font: 700 36px/1 'Inter', Arial, sans-serif; fill: #eaf4ff }
      .btn-text { font: 600 18px/1 'Inter', Arial, sans-serif; fill: #eaf4ff }
    ]]></style>
  </defs>

  <!-- background -->
  <rect width="100%" height="100%" fill="url(#bg)" />

  <!-- calculator card -->
  <g transform="translate(160,80)" filter="url(#shadow)">
    <rect x="0" y="0" rx="20" ry="20" width="480" height="440" fill="url(#panel)" stroke="#0c1826" stroke-width="1" />

    <!-- header -->
    <text x="28" y="44" class="title">Calculator</text>

    <!-- display area -->
    <g transform="translate(24,68)">
      <rect x="0" y="0" rx="10" ry="10" width="432" height="104" fill="#081526" opacity="0.9" stroke="#0d2336" />
      <text x="16" y="36" class="label">Expression</text>
      <text x="400" y="72" text-anchor="end" class="screen-value">1234.56</text>
    </g>

    <!-- buttons grid -->
    <g transform="translate(24,196)">
      <!-- row 1 -->
      <rect x="0" y="0" rx="10" ry="10" width="204" height="56" fill="#1b2430" stroke="#17202a" />
      <text x="102" y="36" text-anchor="middle" class="btn-text" fill="#99a1b3">AC</text>
      <rect x="216" y="0" rx="10" ry="10" width="102" height="56" fill="#1b2430" stroke="#17202a" />
      <text x="267" y="36" text-anchor="middle" class="btn-text">DEL</text>
      <rect x="330" y="0" rx="10" ry="10" width="126" height="56" fill="#2a3b52" stroke="#223246" />
      <text x="393" y="36" text-anchor="middle" class="btn-text" fill="#a7c6ff">÷</text>

      <!-- row 2 -->
      <g transform="translate(0,70)">
        <rect x="0" y="0" rx="10" ry="10" width="102" height="56" fill="#1f2a3a" />
        <text x="51" y="36" text-anchor="middle" class="btn-text">7</text>
        <rect x="114" y="0" rx="10" ry="10" width="102" height="56" fill="#1f2a3a" />
        <text x="165" y="36" text-anchor="middle" class="btn-text">8</text>
        <rect x="228" y="0" rx="10" ry="10" width="102" height="56" fill="#1f2a3a" />
        <text x="279" y="36" text-anchor="middle" class="btn-text">9</text>
        <rect x="342" y="0" rx="10" ry="10" width="114" height="56" fill="#2a3b52" />
        <text x="399" y="36" text-anchor="middle" class="btn-text" fill="#a7c6ff">×</text>
      </g>

      <!-- row 3 -->
      <g transform="translate(0,140)">
        <rect x="0" y="0" rx="10" ry="10" width="102" height="56" fill="#1f2a3a" />
        <text x="51" y="36" text-anchor="middle" class="btn-text">4</text>
        <rect x="114" y="0" rx="10" ry="10" width="102" height="56" fill="#1f2a3a" />
        <text x="165" y="36" text-anchor="middle" class="btn-text">5</text>
        <rect x="228" y="0" rx="10" ry="10" width="102" height="56" fill="#1f2a3a" />
        <text x="279" y="36" text-anchor="middle" class="btn-text">6</text>
        <rect x="342" y="0" rx="10" ry="10" width="114" height="56" fill="#2a3b52" />
        <text x="399" y="36" text-anchor="middle" class="btn-text" fill="#a7c6ff">−</text>
      </g>

      <!-- row 4 -->
      <g transform="translate(0,210)">
        <rect x="0" y="0" rx="10" ry="10" width="102" height="56" fill="#1f2a3a" />
        <text x="51" y="36" text-anchor="middle" class="btn-text">1</text>
        <rect x="114" y="0" rx="10" ry="10" width="102" height="56" fill="#1f2a3a" />
        <text x="165" y="36" text-anchor="middle" class="btn-text">2</text>
        <rect x="228" y="0" rx="10" ry="10" width="102" height="56" fill="#1f2a3a" />
        <text x="279" y="36" text-anchor="middle" class="btn-text">3</text>
        <rect x="342" y="0" rx="10" ry="10" width="114" height="56" fill="#2a3b52" />
        <text x="399" y="36" text-anchor="middle" class="btn-text" fill="#a7c6ff">+</text>
      </g>

      <!-- row 5 -->
      <g transform="translate(0,280)">
        <rect x="0" y="0" rx="10" ry="10" width="204" height="56" fill="#1f2a3a" />
        <text x="102" y="36" text-anchor="middle" class="btn-text">0</text>
        <rect x="216" y="0" rx="10" ry="10" width="102" height="56" fill="#1f2a3a" />
        <text x="267" y="36" text-anchor="middle" class="btn-text">.</text>
        <rect x="330" y="0" rx="10" ry="10" width="126" height="56" fill="#6a48ff" />
        <text x="393" y="36" text-anchor="middle" class="btn-text">=</text>
      </g>

    </g>

  </g>

  <!-- small caption -->
  <text x="400" y="560" text-anchor="middle" class="label">calculator/preview.svg</text>
</svg>
