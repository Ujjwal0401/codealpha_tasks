<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Image Gallery - Professional Web Design</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .gallery-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ==================== HEADER STYLES ==================== */
        .gallery-header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            animation: slideDown 0.8s ease-out;
        }

        .gallery-header h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
        }

        .gallery-header p {
            font-size: 1.2rem;
            opacity: 0.95;
            font-weight: 300;
        }

        /* ==================== FILTER SECTION ==================== */
        .filter-section {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
            flex-wrap: wrap;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        .filter-btn {
            padding: 12px 30px;
            border: 2px solid white;
            background: transparent;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            text-transform: capitalize;
        }

        .filter-btn:hover {
            background: white;
            color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .filter-btn.active {
            background: white;
            color: #667eea;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        /* ==================== GALLERY GRID ==================== */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        .gallery-item {
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.4s ease;
            transform: scale(1);
        }

        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .gallery-item.hidden {
            display: none;
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
            overflow: hidden;
            background: #f0f0f0;
        }

        .image-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .gallery-item:hover .image-wrapper img {
            transform: scale(1.1) rotate(2deg);
        }

        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.8) 0%, rgba(118, 75, 162, 0.8) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(5px);
        }

        .gallery-item:hover .image-overlay {
            opacity: 1;
        }

        .image-overlay h3 {
            color: white;
            font-size: 1.5rem;
            text-align: center;
            font-weight: 600;
            padding: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
        }

        /* ==================== LIGHTBOX STYLES ==================== */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.4s ease;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-image {
            max-width: 90%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
            animation: zoomIn 0.4s ease;
        }

        .lightbox-caption {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: white;
            font-size: 3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .lightbox-close:hover {
            transform: rotate(90deg);
            color: #667eea;
        }

        .lightbox-prev,
        .lightbox-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            font-size: 2rem;
            padding: 15px 20px;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-prev:hover,
        .lightbox-next:hover {
            background: rgba(102, 126, 234, 0.8);
            transform: translateY(-50%) scale(1.1);
        }

        .lightbox-prev {
            left: 30px;
        }

        .lightbox-next {
            right: 30px;
        }

        /* ==================== ANIMATIONS ==================== */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ==================== RESPONSIVE DESIGN ==================== */
        @media (max-width: 768px) {
            .gallery-header h1 {
                font-size: 2.5rem;
            }

            .gallery-header p {
                font-size: 1rem;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 15px;
            }

            .filter-section {
                gap: 10px;
            }

            .filter-btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }

            .lightbox-prev,
            .lightbox-next {
                padding: 10px 15px;
                font-size: 1.5rem;
            }

            .lightbox-image {
                max-width: 95%;
                max-height: 70vh;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .gallery-header h1 {
                font-size: 2rem;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 10px;
            }

            .filter-section {
                gap: 8px;
            }

            .filter-btn {
                padding: 8px 15px;
                font-size: 0.8rem;
            }

            .image-overlay h3 {
                font-size: 1rem;
            }

            .lightbox-close {
                font-size: 2rem;
                top: 15px;
                right: 15px;
            }

            .lightbox-prev {
                left: 10px;
            }

            .lightbox-next {
                right: 10px;
            }

            .lightbox-caption {
                bottom: 15px;
                font-size: 1rem;
                padding: 10px 20px;
            }
        }

        /* ==================== LOADING ANIMATION ==================== */
        .gallery-item {
            opacity: 0;
            animation: fadeIn 0.6s ease forwards;
        }

        .gallery-item:nth-child(1) { animation-delay: 0s; }
        .gallery-item:nth-child(2) { animation-delay: 0.1s; }
        .gallery-item:nth-child(3) { animation-delay: 0.2s; }
        .gallery-item:nth-child(4) { animation-delay: 0.3s; }
        .gallery-item:nth-child(5) { animation-delay: 0.4s; }
        .gallery-item:nth-child(6) { animation-delay: 0.5s; }
        .gallery-item:nth-child(7) { animation-delay: 0.6s; }
        .gallery-item:nth-child(8) { animation-delay: 0.7s; }
        .gallery-item:nth-child(9) { animation-delay: 0.8s; }
        .gallery-item:nth-child(10) { animation-delay: 0.9s; }
        .gallery-item:nth-child(11) { animation-delay: 1s; }
        .gallery-item:nth-child(12) { animation-delay: 1.1s; }
    </style>
</head>
<body>
    <div class="gallery-container">
        <!-- Header Section -->
        <header class="gallery-header">
            <h1>Image Gallery</h1>
            <p>Explore our curated collection of stunning images</p>
        </header>

        <!-- Filter Section -->
        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="nature">Nature</button>
            <button class="filter-btn" data-filter="architecture">Architecture</button>
            <button class="filter-btn" data-filter="people">People</button>
        </div>

        <!-- Gallery Grid -->
        <div class="gallery-grid">
            <!-- Nature Images -->
            <div class="gallery-item" data-category="nature">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=500&h=500&fit=crop" alt="Mountain Landscape">
                    <div class="image-overlay">
                        <h3>Mountain Serenity</h3>
                    </div>
                </div>
            </div>

            <div class="gallery-item" data-category="nature">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=500&h=500&fit=crop" alt="Forest Nature">
                    <div class="image-overlay">
                        <h3>Forest Whispers</h3>
                    </div>
                </div>
            </div>

            <div class="gallery-item" data-category="nature">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1505142468610-359e7d316be0?w=500&h=500&fit=crop" alt="Ocean Waves">
                    <div class="image-overlay">
                        <h3>Ocean Dreams</h3>
                    </div>
                </div>
            </div>

            <div class="gallery-item" data-category="nature">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=500&h=500&fit=crop" alt="Nature Beauty">
                    <div class="image-overlay">
                        <h3>Natural Wonders</h3>
                    </div>
                </div>
            </div>

            <!-- Architecture Images -->
            <div class="gallery-item" data-category="architecture">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1486325212027-8081e485255e?w=500&h=500&fit=crop" alt="Modern Architecture">
                    <div class="image-overlay">
                        <h3>Modern Design</h3>
                    </div>
                </div>
            </div>

            <div class="gallery-item" data-category="architecture">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1479839672679-a464822900bb?w=500&h=500&fit=crop" alt="Urban Architecture">
                    <div class="image-overlay">
                        <h3>Urban Landscape</h3>
                    </div>
                </div>
            </div>

            <div class="gallery-item" data-category="architecture">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1464207687429-7505649dae38?w=500&h=500&fit=crop" alt="Building Design">
                    <div class="image-overlay">
                        <h3>Architectural Marvel</h3>
                    </div>
                </div>
            </div>

            <div class="gallery-item" data-category="architecture">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1495080715262-c72ec4c57808?w=500&h=500&fit=crop" alt="Contemporary Building">
                    <div class="image-overlay">
                        <h3>Contemporary Art</h3>
                    </div>
                </div>
            </div>

            <!-- People Images -->
            <div class="gallery-item" data-category="people">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=500&h=500&fit=crop" alt="Portrait Person">
                    <div class="image-overlay">
                        <h3>Professional Portrait</h3>
                    </div>
                </div>
            </div>

            <div class="gallery-item" data-category="people">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1516321318423-f06f70d504f0?w=500&h=500&fit=crop" alt="Happy Person">
                    <div class="image-overlay">
                        <h3>Joy & Happiness</h3>
                    </div>
                </div>
            </div>

            <div class="gallery-item" data-category="people">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1519904981063-b0cf448d479e?w=500&h=500&fit=crop" alt="Professional Headshot">
                    <div class="image-overlay">
                        <h3>Business Portrait</h3>
                    </div>
                </div>
            </div>

            <div class="gallery-item" data-category="people">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1524634126288-917f7ce83b9e?w=500&h=500&fit=crop" alt="Creative Person">
                    <div class="image-overlay">
                        <h3>Creative Mind</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- Lightbox Modal -->
        <div class="lightbox" id="lightbox">
            <span class="lightbox-close">&times;</span>
            <img class="lightbox-image" src="" alt="Gallery Image">
            <div class="lightbox-caption"></div>
            <button class="lightbox-prev">&#10094;</button>
            <button class="lightbox-next">&#10095;</button>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        /*
        ============================================================
        PROFESSIONAL IMAGE GALLERY - JAVASCRIPT
        ============================================================
        Features:
        - Category filtering
        - Lightbox modal with image navigation
        - Keyboard controls (arrows, escape)
        - Touch/swipe support for mobile
        - Smooth animations and transitions
        ============================================================
        */

        // ==================== DOM ELEMENTS ==================== //
        const galleryImages = document.querySelectorAll('.gallery-item');
        const filterButtons = document.querySelectorAll('.filter-btn');
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.querySelector('.lightbox-image');
        const lightboxCaption = document.querySelector('.lightbox-caption');
        const lightboxClose = document.querySelector('.lightbox-close');
        const lightboxPrev = document.querySelector('.lightbox-prev');
        const lightboxNext = document.querySelector('.lightbox-next');

        // ==================== VARIABLES ==================== //
        let currentImageIndex = 0;
        let filteredImages = [];
        let touchStartX = 0;
        let touchEndX = 0;

        // ==================== FILTER FUNCTIONALITY ==================== //
        /**
         * Add click listeners to all filter buttons
         */
        filterButtons.forEach(button => {
            button.addEventListener('click', () => {
                // Remove active class from all buttons
                filterButtons.forEach(btn => btn.classList.remove('active'));
                
                // Add active class to clicked button
                button.classList.add('active');
                
                // Get filter value
                const filterValue = button.getAttribute('data-filter');
                
                // Filter and display images
                filterImages(filterValue);
            });
        });

        /**
         * Filter images based on category
         * @param {string} category - The category to filter by
         */
        function filterImages(category) {
            galleryImages.forEach(item => {
                if (category === 'all') {
                    item.classList.remove('hidden');
                    item.style.display = 'block';
                    item.style.animation = 'fadeIn 0.5s ease forwards';
                } else {
                    if (item.getAttribute('data-category') === category) {
                        item.classList.remove('hidden');
                        item.style.display = 'block';
                        item.style.animation = 'fadeIn 0.5s ease forwards';
                    } else {
                        item.classList.add('hidden');
                        item.style.display = 'none';
                    }
                }
            });
        }

        // ==================== LIGHTBOX FUNCTIONALITY ==================== //
        /**
         * Add click listeners to gallery items to open lightbox
         */
        galleryImages.forEach((item, index) => {
            item.addEventListener('click', () => {
                // Check if item is visible (not filtered out)
                if (item.style.display !== 'none') {
                    openLightbox(item);
                }
            });
        });

        /**
         * Open lightbox with the clicked image
         * @param {HTMLElement} item - The gallery item to display
         */
        function openLightbox(item) {
            const img = item.querySelector('img');
            const caption = item.querySelector('h3');
            
            lightboxImage.src = img.src;
            lightboxCaption.textContent = caption.textContent;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
            
            currentImageIndex = Array.from(galleryImages).indexOf(item);
        }

        /**
         * Close the lightbox
         */
        function closeLightbox() {
            lightbox.classList.remove('active');
            lightboxImage.src = '';
            document.body.style.overflow = 'auto';
        }

        // ==================== EVENT LISTENERS ==================== //
        // Close button click
        lightboxClose.addEventListener('click', closeLightbox);

        // Click outside image to close
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            
            if (e.key === 'Escape') {
                closeLightbox();
            } else if (e.key === 'ArrowLeft') {
                showPreviousImage();
            } else if (e.key === 'ArrowRight') {
                showNextImage();
            }
        });

        // Navigation buttons
        lightboxPrev.addEventListener('click', showPreviousImage);
        lightboxNext.addEventListener('click', showNextImage);

        // ==================== IMAGE NAVIGATION ==================== //
        /**
         * Display the previous visible image in lightbox
         */
        function showPreviousImage() {
            const visibleItems = Array.from(galleryImages).filter(item => 
                item.style.display !== 'none' && !item.classList.contains('hidden')
            );
            
            let currentVisibleIndex = visibleItems.findIndex(item => {
                const img = item.querySelector('img');
                return img.src === lightboxImage.src;
            });
            
            currentVisibleIndex = (currentVisibleIndex - 1 + visibleItems.length) % visibleItems.length;
            
            const prevItem = visibleItems[currentVisibleIndex];
            updateLightboxImage(prevItem);
        }

        /**
         * Display the next visible image in lightbox
         */
        function showNextImage() {
            const visibleItems = Array.from(galleryImages).filter(item => 
                item.style.display !== 'none' && !item.classList.contains('hidden')
            );
            
            let currentVisibleIndex = visibleItems.findIndex(item => {
                const img = item.querySelector('img');
                return img.src === lightboxImage.src;
            });
            
            currentVisibleIndex = (currentVisibleIndex + 1) % visibleItems.length;
            
            const nextItem = visibleItems[currentVisibleIndex];
            updateLightboxImage(nextItem);
        }

        /**
         * Update lightbox with new image
         * @param {HTMLElement} item - The gallery item to display
         */
        function updateLightboxImage(item) {
            const img = item.querySelector('img');
            const caption = item.querySelector('h3');
            
            lightboxImage.style.animation = 'none';
            setTimeout(() => {
                lightboxImage.src = img.src;
                lightboxCaption.textContent = caption.textContent;
                lightboxImage.style.animation = 'zoomIn 0.4s ease';
            }, 10);
        }

        // ==================== TOUCH SUPPORT ==================== //
        /**
         * Detect touch start
         */
        lightbox.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });

        /**
         * Detect touch end and handle swipe
         */
        lightbox.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        /**
         * Handle swipe gestures
         */
        function handleSwipe() {
            const swipeThreshold = 50;
            
            if (touchStartX - touchEndX > swipeThreshold) {
                // Swiped left - show next image
                showNextImage();
            } else if (touchEndX - touchStartX > swipeThreshold) {
                // Swiped right - show previous image
                showPreviousImage();
            }
        }

        // ==================== INITIALIZATION ==================== //
        /**
         * Log gallery information on page load
         */
        window.addEventListener('load', () => {
            console.log('%c✨ Premium Image Gallery Loaded Successfully! ✨', 
                'color: #667eea; font-size: 16px; font-weight: bold;');
            console.log(`Total Images: ${galleryImages.length}`);
            console.log('Features: Filter, Lightbox, Keyboard Navigation, Touch Support');
        });
    </script>
</body>
</html>
